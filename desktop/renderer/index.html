<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axonize</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-layer"></div>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <p class="brand-kicker">Semantic Document Operating System</p>
          <h1>Axonize</h1>
        </div>
        <div class="workspace-controls">
          <label class="theme-control">
            Theme
            <select id="theme-mode">
              <option value="system">System</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
          <input
            id="workspace-manual"
            class="workspace-input"
            type="text"
            placeholder="/absolute/path/to/workspace-or-docs"
          />
          <button id="set-workspace" class="btn secondary">Set Path</button>
          <button id="choose-workspace" class="btn secondary">Choose Workspace</button>
          <button id="rebuild" class="btn primary">Rebuild Graph</button>
          <button id="rebuild-full" class="btn secondary">Full Rebuild</button>
          <button id="check" class="btn subtle">Check Integrity</button>
        </div>
      </header>

      <main class="main-layout">
        <section class="panel summary-panel">
          <div class="workspace-chip" id="workspace-path">No workspace selected</div>
          <div class="stats-grid">
            <article class="stat-card">
              <p>Nodes</p>
              <h2 id="stat-nodes">0</h2>
            </article>
            <article class="stat-card">
              <p>Edges</p>
              <h2 id="stat-edges">0</h2>
            </article>
            <article class="stat-card">
              <p>Changed</p>
              <h2 id="stat-changed">0</h2>
            </article>
          </div>
          <pre id="status-log" class="status-log">Awaiting first rebuild...</pre>
        </section>

        <section class="panel orbit-panel">
          <div class="panel-head">
            <h2>Semantic Orbit</h2>
            <label class="zoom">
              Zoom
              <select id="zoom-level">
                <option value="z4">Z4 Full Text</option>
                <option value="z3">Z3 Reduced Text</option>
                <option value="z2">Z2 Bullets</option>
                <option value="z1">Z1 Title</option>
                <option value="z0">Z0 Node</option>
              </select>
            </label>
          </div>
          <svg id="orbit-canvas" viewBox="0 0 960 640" role="img" aria-label="Semantic graph orbit"></svg>
        </section>

        <section class="panel command-panel">
          <h2>Command Shell</h2>
          <form id="command-form" class="command-form">
            <label>
              Target Block ID
              <input id="command-target" name="target" type="text" placeholder="block_id" required />
            </label>
            <label>
              Instruction
              <input id="command-instruction" name="instruction" type="text" placeholder="make concise" required />
            </label>
            <label>
              Scope
              <select id="command-scope" name="scope">
                <option value="block">block</option>
                <option value="section">section</option>
              </select>
            </label>
            <div class="command-actions">
              <button class="btn secondary" type="button" id="command-preview">Preview Diff</button>
              <button class="btn primary" type="button" id="command-apply">Apply + Regraph</button>
            </div>
          </form>
          <pre id="command-output" class="command-output">No command executed yet.</pre>
        </section>
      </main>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
