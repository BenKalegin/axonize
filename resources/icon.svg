<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Blob gradients -->
    <radialGradient id="blob1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <radialGradient id="blob2" cx="60%" cy="65%" r="60%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <!-- Soft glow filter -->
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
    <!-- Outer shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Mac-style squircle background -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110"
        fill="#1e1e2e" filter="url(#shadow)"/>

  <!-- Inner subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Clip blobs to squircle -->
  <clipPath id="squircle">
    <rect x="16" y="16" width="480" height="480" rx="110" ry="110"/>
  </clipPath>

  <g clip-path="url(#squircle)">
    <!-- Soft glowing backdrop for blobs -->
    <g filter="url(#softglow)" opacity="0.5">
      <ellipse cx="200" cy="200" rx="160" ry="150" fill="#a78bfa"/>
      <ellipse cx="320" cy="330" rx="150" ry="140" fill="#38bdf8"/>
    </g>

    <!-- Primary blob - purple, upper-left -->
    <ellipse cx="205" cy="205" rx="130" ry="120" fill="url(#blob1)" opacity="0.85"/>

    <!-- Secondary blob - blue, lower-right -->
    <ellipse cx="315" cy="325" rx="120" ry="110" fill="url(#blob2)" opacity="0.8"/>

    <!-- Overlap blend highlight -->
    <ellipse cx="260" cy="265" rx="70" ry="65" fill="rgba(255,255,255,0.08)"/>

    <!-- Neural connection lines between blobs -->
    <g stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round" fill="none">
      <path d="M220 260 Q256 240 290 275"/>
      <path d="M240 235 Q270 260 300 250"/>
      <path d="M195 280 Q250 290 280 310"/>
    </g>

    <!-- Connection nodes -->
    <g fill="rgba(255,255,255,0.3)">
      <circle cx="220" cy="260" r="4"/>
      <circle cx="290" cy="275" r="4"/>
      <circle cx="240" cy="235" r="3.5"/>
      <circle cx="300" cy="250" r="3.5"/>
      <circle cx="195" cy="280" r="3"/>
      <circle cx="280" cy="310" r="3"/>
    </g>

    <!-- Central bright node - the "axon" focal point -->
    <circle cx="256" cy="256" r="8" fill="rgba(255,255,255,0.5)"/>
    <circle cx="256" cy="256" r="4" fill="rgba(255,255,255,0.9)"/>
  </g>
</svg>
