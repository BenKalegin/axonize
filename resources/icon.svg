<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="bone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e6ff"/>
      <stop offset="100%" stop-color="#d4bfff"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)" filter="url(#shadow)"/>

  <!-- skull body -->
  <ellipse cx="256" cy="230" rx="130" ry="140" fill="url(#bone)" stroke="#8b5cf6" stroke-width="4"/>

  <!-- jaw -->
  <path d="M176 280 Q176 350 216 360 L226 340 L246 355 L266 340 L286 355 L296 360 Q336 350 336 280"
        fill="url(#bone)" stroke="#8b5cf6" stroke-width="4" stroke-linejoin="round"/>

  <!-- teeth -->
  <rect x="216" y="330" width="20" height="25" rx="4" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="240" y="326" width="20" height="29" rx="4" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="264" y="326" width="20" height="29" rx="4" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="288" y="330" width="20" height="25" rx="4" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>

  <!-- left eye socket -->
  <ellipse cx="216" cy="210" rx="36" ry="38" fill="#4c1d95"/>
  <!-- right eye socket -->
  <ellipse cx="296" cy="210" rx="36" ry="38" fill="#4c1d95"/>

  <!-- left eye - winking (closed) -->
  <path d="M194 212 Q216 195 238 212" fill="none" stroke="#facc15" stroke-width="6" stroke-linecap="round"/>

  <!-- right eye - open, looking up-right -->
  <circle cx="302" cy="205" r="16" fill="#facc15"/>
  <circle cx="308" cy="200" r="7" fill="#4c1d95"/>
  <!-- eye shine -->
  <circle cx="312" cy="196" r="3" fill="#fff"/>

  <!-- nose -->
  <path d="M248 258 L256 248 L264 258 Z" fill="#4c1d95"/>

  <!-- crack on skull (battle scar) -->
  <path d="M300 130 L290 165 L300 175 L288 200" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- axon/neural spark - top left -->
  <g fill="url(#spark)" stroke="#f59e0b" stroke-width="1.5">
    <circle cx="160" cy="110" r="8"/>
    <line x1="168" y1="110" x2="190" y2="135" stroke="#facc15" stroke-width="3" stroke-linecap="round"/>
    <circle cx="145" cy="95" r="5"/>
    <line x1="150" y1="98" x2="157" y2="107" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
    <circle cx="140" cy="120" r="5"/>
    <line x1="145" y1="118" x2="156" y2="112" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- axon/neural spark - top right -->
  <g fill="url(#spark)" stroke="#f59e0b" stroke-width="1.5">
    <circle cx="352" cy="100" r="8"/>
    <line x1="344" y1="100" x2="325" y2="125" stroke="#facc15" stroke-width="3" stroke-linecap="round"/>
    <circle cx="370" cy="85" r="5"/>
    <line x1="365" y1="88" x2="356" y2="97" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
    <circle cx="375" cy="112" r="5"/>
    <line x1="370" y1="110" x2="356" y2="103" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- axon/neural spark - bottom left -->
  <g fill="url(#spark)" stroke="#f59e0b" stroke-width="1.5">
    <circle cx="130" cy="300" r="6"/>
    <line x1="136" y1="297" x2="160" y2="282" stroke="#facc15" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="118" cy="285" r="4"/>
    <line x1="122" y1="287" x2="128" y2="296" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- axon/neural spark - bottom right -->
  <g fill="url(#spark)" stroke="#f59e0b" stroke-width="1.5">
    <circle cx="382" cy="295" r="6"/>
    <line x1="376" y1="292" x2="352" y2="278" stroke="#facc15" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="395" cy="280" r="4"/>
    <line x1="391" y1="282" x2="385" y2="291" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- tiny stars / sparkle accents -->
  <text x="150" y="160" font-size="24" fill="#facc15" opacity="0.8">&#x2728;</text>
  <text x="345" y="155" font-size="18" fill="#facc15" opacity="0.7">&#x2728;</text>

  <!-- cheeky tongue sticking out -->
  <ellipse cx="256" cy="368" rx="16" ry="10" fill="#f472b6" stroke="#db2777" stroke-width="2"/>
</svg>
